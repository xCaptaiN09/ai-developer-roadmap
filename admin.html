<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMX3031 Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #ffffff0f;
    --accent: #ff6b35;
    --accent2: #ff9a1f;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(#ffffff06 1px, transparent 1px),
      linear-gradient(90deg, #ffffff06 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  header { margin-bottom: 36px; }

  .badge {
    display: inline-block;
    background: #ff6b3520;
    border: 1px solid #ff6b3540;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 30px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: -1px;
    line-height: 1;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .token-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .token-card.connected { border-color: #22c55e30; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.green { background: var(--green); box-shadow: 0 0 6px #22c55e80; }
  .dot.red { background: var(--red); }

  .token-input-row { display: flex; gap: 8px; flex: 1; min-width: 200px; }

  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .nav-tab {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.2s;
  }

  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { background: var(--accent); color: white; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  label .req { color: var(--accent); }

  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 72px; }
  input::placeholder, textarea::placeholder { color: var(--muted); font-size: 13px; }

  .url-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    word-break: break-all;
    min-height: 38px;
    line-height: 1.5;
  }

  .json-preview {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #a0a0b0;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.6;
  }

  .json-key { color: #7dd3fc; }
  .json-str { color: #86efac; }

  .btn {
    padding: 11px 22px;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #ff8050; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.6; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: #5b9cf6; }
  .btn-blue:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 8px 14px; font-size: 13px; }

  .btn-row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }

  .tab-list { display: flex; flex-direction: column; gap: 8px; }

  .tab-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }

  .tab-item-info { display: flex; flex-direction: column; gap: 3px; }
  .tab-item-name { font-size: 14px; font-weight: 600; }
  .tab-item-key { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

  .tab-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: #ff6b3520;
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-row {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 16px 0;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 18px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 340px;
    line-height: 1.4;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: #22c55e40; color: var(--green); }
  .toast.error { border-color: #ef444440; color: var(--red); }
  .toast.loading { border-color: #ff6b3540; color: var(--accent); }

  #android-group { display: none; }

  .hint { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">● ADMIN PANEL</div>
    <h1>RMX3031 <span>Admin</span></h1>
    <p class="subtitle">Manage index.json and tabs via GitHub API</p>
  </header>

  <div class="token-card" id="tokenCard">
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Not configured</span>
    </div>
    <div class="token-input-row">
      <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (repo scope)" />
      <button class="btn btn-secondary btn-sm" onclick="saveToken()">Save</button>
    </div>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPanel('add', this)">Add Entry</button>
    <button class="nav-tab" onclick="switchPanel('tabs', this)">Manage Tabs</button>
  </div>

  <div class="panel active" id="panel-add">
    <div class="card">
      <div class="card-title">New File Entry</div>
      <div class="form-grid">

        <div class="form-group">
          <label>Tab <span class="req">*</span></label>
          <select id="tab" onchange="onTabChange()">
            <option value="">Loading tabs...</option>
          </select>
        </div>

        <div class="form-group">
          <label>Name <span class="req">*</span></label>
          <input type="text" id="name" placeholder="e.g. F01 Toolbox" oninput="updatePreview()" />
        </div>

        <div class="form-group">
          <label>Version</label>
          <input type="text" id="version" placeholder="e.g. F01" oninput="updatePreview()" />
        </div>

        <div class="form-group">
          <label>Size</label>
          <input type="text" id="size" placeholder="e.g. 6.59GB" oninput="updatePreview()" />
        </div>

        <div class="form-group">
          <label>Date <span class="req">*</span></label>
          <input type="date" id="date" oninput="updatePreview()" />
        </div>

        <div class="form-group" id="android-group">
          <label>Android Version</label>
          <input type="text" id="android" placeholder="e.g. 16" oninput="updatePreview()" />
        </div>

        <div class="form-group">
          <label>Archive.org Item ID <span class="req">*</span></label>
          <input type="text" id="itemId" placeholder="e.g. rmx3350-flash-f01" oninput="updateUrl()" />
        </div>

        <div class="form-group">
          <label>Filename <span class="req">*</span></label>
          <input type="text" id="filename" placeholder="e.g. RMX3350-F01-Toolbox.zip" oninput="updateUrl()" />
        </div>

        <div class="form-group full">
          <label>Download URL (auto)</label>
          <div class="url-preview" id="urlPreview">Fill Item ID and Filename above...</div>
        </div>

        <div class="form-group full">
          <label>Changelog <span class="req">*</span></label>
          <textarea id="changelog" placeholder="Enter changelog or description..." oninput="updatePreview()"></textarea>
        </div>

      </div>

      <div class="divider"></div>
      <div class="card-title">JSON Preview</div>
      <div class="json-preview" id="jsonPreview">Fill in the form to see preview...</div>

      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
        <button class="btn btn-primary" id="submitBtn" onclick="submitEntry()">Add to index.json</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-tabs">
    <div class="card">
      <div class="card-title">Current Tabs</div>
      <div class="tab-list" id="tabList">
        <div class="loading-row"><span class="spinner"></span> Loading...</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary btn-sm" onclick="loadAll()">Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Create New Tab</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Display Name <span class="req">*</span></label>
          <input type="text" id="newTabName" placeholder="e.g. GT Neo 2T" oninput="updateTabKeyHint()" />
          <div class="hint" id="tabKeyHint"></div>
        </div>
        <div class="form-group">
          <label>Tab Key <span class="req">*</span></label>
          <input type="text" id="newTabKey" placeholder="e.g. ota_gt2t" />
          <div class="hint">Lowercase, underscores only. Used in index.json.</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-blue" id="createTabBtn" onclick="createTab()">Create Tab</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const OWNER = 'xCaptaiN09';
  const REPO = 'RMX3031-Community-Files';
  const BRANCH = 'main';

  const DEFAULT_NAMES = {
    roms:'ROMs', kernels:'Kernels', modules:'Modules',
    ota:'X7 MAX', ota_cn:'GT Neo', ota_cnf:'GT Neo Flash',
    firmware:'Firmware', sptool:'SP Tool FW',
    recovery:'Recovery', other:'Other'
  };

  let indexJsonSha = null, indexData = null;

  document.getElementById('date').value = new Date().toISOString().split('T')[0];

  const saved = localStorage.getItem('gh_token');
  if (saved) { document.getElementById('ghToken').value = saved; setStatus(true); loadAll(); }

  function saveToken() {
    const t = document.getElementById('ghToken').value.trim();
    if (!t) return showToast('Enter a token', 'error');
    localStorage.setItem('gh_token', t);
    setStatus(true);
    showToast('Token saved', 'success');
    loadAll();
  }

  function setStatus(ok) {
    document.getElementById('statusDot').className = 'dot ' + (ok ? 'green' : 'red');
    document.getElementById('statusText').textContent = ok ? 'Connected' : 'Not configured';
    document.getElementById('tokenCard').className = 'token-card' + (ok ? ' connected' : '');
  }

  function getToken() { return localStorage.getItem('gh_token'); }

  function apiHeaders() {
    return { 'Authorization': `Bearer ${getToken()}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' };
  }

  async function loadAll() {
    await fetchIndexJson();
    populateTabDropdown();
    renderTabList();
  }

  async function fetchIndexJson() {
    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/index.json?ref=${BRANCH}`, { headers: apiHeaders() });
      if (!res.ok) throw new Error('Auth failed');
      const file = await res.json();
      indexJsonSha = file.sha;
      indexData = JSON.parse(atob(file.content.replace(/\n/g, '')));
    } catch(e) { showToast('Failed to load index.json: ' + e.message, 'error'); }
  }

  function populateTabDropdown() {
    if (!indexData) return;
    const sel = document.getElementById('tab');
    const current = sel.value;
    sel.innerHTML = '<option value="">Select tab</option>';
    Object.keys(indexData).filter(k => Array.isArray(indexData[k])).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = (DEFAULT_NAMES[key] || key) + ` (${indexData[key].length})`;
      if (key === current) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function renderTabList() {
    const el = document.getElementById('tabList');
    if (!indexData) { el.innerHTML = '<div class="loading-row">Failed to load</div>'; return; }
    const tabs = Object.keys(indexData).filter(k => Array.isArray(indexData[k]));
    el.innerHTML = tabs.map(key => `
      <div class="tab-item">
        <div class="tab-item-info">
          <div class="tab-item-name">${DEFAULT_NAMES[key] || key}</div>
          <div class="tab-item-key">${key}</div>
        </div>
        <span class="tab-count">${indexData[key].length} files</span>
      </div>
    `).join('');
  }

  function switchPanel(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function onTabChange() {
    const tab = document.getElementById('tab').value;
    document.getElementById('android-group').style.display = tab === 'roms' ? 'flex' : 'none';
    updatePreview();
  }

  function updateUrl() {
    const id = document.getElementById('itemId').value.trim();
    const fn = document.getElementById('filename').value.trim();
    document.getElementById('urlPreview').textContent = id && fn
      ? `https://archive.org/download/${id}/${fn}`
      : 'Fill Item ID and Filename above...';
    updatePreview();
  }

  function buildEntry() {
    const tab = document.getElementById('tab').value;
    const id = document.getElementById('itemId').value.trim();
    const fn = document.getElementById('filename').value.trim();
    const e = {
      name: document.getElementById('name').value.trim(),
      version: document.getElementById('version').value.trim(),
      date: document.getElementById('date').value,
      size: document.getElementById('size').value.trim(),
      url: id && fn ? `https://archive.org/download/${id}/${fn}` : '',
      changelog: document.getElementById('changelog').value.trim()
    };
    if (tab === 'roms') { const a = document.getElementById('android').value.trim(); if (a) e.android = a; }
    if (!e.version) delete e.version;
    if (!e.size) delete e.size;
    return e;
  }

  function updatePreview() {
    document.getElementById('jsonPreview').innerHTML = highlight(JSON.stringify(buildEntry(), null, 2));
  }

  function highlight(json) {
    return json
      .replace(/("[\w]+")\s*:/g, '<span class="json-key">$1</span>:')
      .replace(/:\s*(".*?")/g, ': <span class="json-str">$1</span>');
  }

  async function submitEntry() {
    if (!getToken()) return showToast('No token saved', 'error');
    const tab = document.getElementById('tab').value;
    if (!tab) return showToast('Select a tab', 'error');
    if (!document.getElementById('name').value.trim()) return showToast('Name is required', 'error');
    if (!document.getElementById('itemId').value.trim() || !document.getElementById('filename').value.trim())
      return showToast('Item ID and Filename required', 'error');
    if (!document.getElementById('changelog').value.trim()) return showToast('Changelog is required', 'error');

    const entry = buildEntry();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    showToast('Saving...', 'loading');

    try {
      await fetchIndexJson();
      if (!indexData[tab]) throw new Error(`Tab "${tab}" not found`);
      indexData[tab].push(entry);
      await commitJson(indexData, `Add ${entry.name} to ${tab}`);
      showToast(`✓ ${entry.name} added to ${tab}`, 'success');
      resetForm();
      populateTabDropdown();
      renderTabList();
    } catch(e) {
      showToast(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  async function commitJson(data, message) {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/index.json`, {
      method: 'PUT',
      headers: apiHeaders(),
      body: JSON.stringify({
        message,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
        sha: indexJsonSha,
        branch: BRANCH
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Commit failed'); }
    const updated = await res.json();
    indexJsonSha = updated.content.sha;
  }

  function updateTabKeyHint() {
    const name = document.getElementById('newTabName').value.trim();
    const key = name.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
    document.getElementById('tabKeyHint').textContent = key ? `Suggested key: ${key}` : '';
    if (!document.getElementById('newTabKey').value) document.getElementById('newTabKey').value = key;
  }

  async function createTab() {
    if (!getToken()) return showToast('No token saved', 'error');
    const name = document.getElementById('newTabName').value.trim();
    const key = document.getElementById('newTabKey').value.trim();
    if (!name) return showToast('Display name required', 'error');
    if (!key) return showToast('Tab key required', 'error');
    if (!/^[a-z0-9_]+$/.test(key)) return showToast('Key: lowercase, numbers, underscores only', 'error');

    const btn = document.getElementById('createTabBtn');
    btn.disabled = true;
    showToast('Creating tab...', 'loading');

    try {
      // Update index.json
      await fetchIndexJson();
      if (indexData[key] !== undefined) throw new Error(`Key "${key}" already exists`);
      indexData[key] = [];
      await commitJson(indexData, `Add new tab: ${name} (${key})`);

      // Update index.html
      const htmlRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/index.html?ref=${BRANCH}`, { headers: apiHeaders() });
      if (!htmlRes.ok) throw new Error('Failed to fetch index.html');
      const htmlFile = await htmlRes.json();
      let html = decodeURIComponent(escape(atob(htmlFile.content.replace(/\n/g, ''))));

      // Insert tab button before the "other" tab button
      html = html.replace(
        `onclick="switchTab('other')">Other`,
        `onclick="switchTab('${key}')">${name} <span class="count" id="count-${key}">0</span></button>\n      <button class="tab" onclick="switchTab('other')">Other`
      );

      // Insert content div before other div
      html = html.replace(
        `  <div id="tab-other" class="tab-content"></div>`,
        `  <div id="tab-${key}" class="tab-content"></div>\n  <div id="tab-other" class="tab-content"></div>`
      );

      // Add to JS forEach array
      html = html.replace(`'other'].forEach`, `'${key}', 'other'].forEach`);

      const htmlUpdateRes = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/index.html`, {
        method: 'PUT',
        headers: apiHeaders(),
        body: JSON.stringify({
          message: `Add tab: ${name} (${key})`,
          content: btoa(unescape(encodeURIComponent(html))),
          sha: htmlFile.sha,
          branch: BRANCH
        })
      });

      if (!htmlUpdateRes.ok) { const e = await htmlUpdateRes.json(); throw new Error(e.message); }

      showToast(`✓ Tab "${name}" created`, 'success');
      document.getElementById('newTabName').value = '';
      document.getElementById('newTabKey').value = '';
      document.getElementById('tabKeyHint').textContent = '';
      await loadAll();

    } catch(e) {
      showToast(e.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function resetForm() {
    ['name','version','size','android','itemId','filename','changelog'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('tab').value = '';
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('urlPreview').textContent = 'Fill Item ID and Filename above...';
    document.getElementById('jsonPreview').textContent = 'Fill in the form to see preview...';
    document.getElementById('android-group').style.display = 'none';
  }

  let toastTimer;
  function showToast(msg, type) {
    clearTimeout(toastTimer);
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    if (type !== 'loading') toastTimer = setTimeout(() => t.className = 'toast', 3500);
  }
</script>
</body>
</html>
